<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Technician App</title>

  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Technician App" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <style>
    :root{
      --bg:#f6f8fc;
      --card:#fff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e5e7eb;
      --btn:#0f172a;
      --btnText:#fff;
      --good:#16a34a;
      --warn:#f59e0b;
      --bad:#dc2626;
      --info:#2563eb;
      --shadow:0 10px 22px rgba(15,23,42,0.06);
      --radius:16px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:var(--font);
    }

    .wrap{
      max-width:920px;
      margin:22px auto;
      padding:0 14px 40px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
    }

    h1{
      margin:10px 0 8px;
      font-size:24px;
    }

    .muted{
      color:var(--muted);
      font-size:13px;
    }

    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }

    input, select, textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      outline:none;
      background:#fff;
      font-family:inherit;
    }

    textarea{
      min-height:88px;
      resize:vertical;
    }

    input:focus, select:focus, textarea:focus{
      border-color:#cbd5e1;
      box-shadow:0 0 0 4px rgba(37,99,235,0.08);
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .btn{
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 14px;
      font-size:14px;
      cursor:pointer;
      background:#fff;
    }

    .btnPrimary{
      background:var(--btn);
      color:#fff;
      font-weight:800;
    }

    .btnSecondary{
      background:#f1f5f9;
    }

    .btnSmall{
      padding:10px 12px;
      font-size:14px;
    }

    .btn:disabled{
      opacity:0.4;
      background:#f1f5f9;
      cursor:not-allowed;
    }

    .btn:active{
      transform:scale(0.97);
    }

    .top{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      margin-bottom:12px;
      position:sticky;
      top:0;
      background:var(--bg);
      z-index:10;
      padding-bottom:8px;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      border:1px solid var(--line);
      background:#fff;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      cursor:pointer;
    }

    .chip.active{
      background:#0f172a;
      color:#fff;
      border-color:#0f172a;
    }

    .grid{
      display:grid;
      gap:12px;
      margin-top:12px;
    }

    .ticket{
      padding:14px;
      box-shadow:0 4px 10px rgba(0,0,0,0.04);
      border-left:4px solid #e5e7eb;
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
    }

    .ticketHead{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }

    .code{
      font-weight:1000;
      font-size:16px;
    }

    .ticket .muted{
      opacity:0.85;
    }

    .badge{
      letter-spacing:0.3px;
      font-size:12px;
      font-weight:900;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      display:inline-flex;
      align-items:center;
      gap:6px;
      white-space:nowrap;
    }

    .bAssigned{ background:#eef2ff; }
    .bProg{ background:#e7f2ff; }
    .bDone{ background:#dcfce7; }
    .bCancel{ background:#fee2e2; }
    .bWarn{ background:#fff7ed; border-color:#fdba74; }
    .bDanger{
      background:#fee2e2;
      border-color:#f87171;
      color:#991b1b;
    }
    .bInfo{ background:#eff6ff; border-color:#93c5fd; }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:10px;
    }

    .hide{ display:none; }

    .hr{
      height:1px;
      background:#e5e7eb;
      width:100%;
      margin:12px 0;
    }

    .field{
      margin-top:12px;
    }

    .kv{
      display:grid;
      grid-template-columns:110px 1fr;
      gap:6px 10px;
      margin-top:12px;
      font-size:14px;
    }

    .kv .k{
      color:var(--muted);
    }

    .summaryBox{
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      background:#f8fafc;
      margin-top:12px;
    }

    .summaryBox .badge{
      margin-top:6px;
    }

    .noteItem, .partItem{
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      margin-top:10px;
      background:#fff;
    }

    .modalBack{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,0.45);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:9999;
    }

    .modal{
      width:min(760px, 100%);
      max-height:calc(100vh - 32px);
      overflow:auto;
      background:#fff;
      border-radius:18px;
      box-shadow:0 20px 40px rgba(0,0,0,0.18);
      border:1px solid var(--line);
    }

    .modalHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:16px;
      border-bottom:1px solid var(--line);
      position:sticky;
      top:0;
      background:#fff;
      z-index:2;
    }

    .modalTitle{
      font-size:18px;
      font-weight:900;
    }

    .modalBody{
      padding:16px;
    }

    .modalFoot{
      padding:16px;
      border-top:1px solid var(--line);
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      position:sticky;
      bottom:0;
      background:#fff;
    }

    .toast{
      position:fixed;
      right:20px;
      bottom:20px;
      background:#111827;
      color:#fff;
      padding:12px 16px;
      border-radius:12px;
      box-shadow:0 12px 30px rgba(0,0,0,0.2);
      opacity:0;
      pointer-events:none;
      transition:opacity .25s ease;
      z-index:10000;
      font-weight:700;
    }

    .toast.show{ opacity:1; }

    .checklistCard{
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:12px;
      margin-bottom:10px;
      background:#fff;
    }

    .checkTopRow{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }

    .checkTitleWrap{
      flex:1;
      min-width:0;
    }

    .checkTitle{
      font-weight:600;
      line-height:1.35;
    }

    .checkReq{
      color:#b42318;
      margin-left:4px;
    }

    .checkMeta{
      font-size:12px;
      color:#6b7280;
      margin-top:4px;
    }

    .checkSaveState{
      font-size:12px;
      white-space:nowrap;
      min-width:58px;
      text-align:right;
    }

    .checkControlWrap{
      margin-top:10px;
    }

    .checkBooleanRow{
      display:flex;
      align-items:center;
      gap:10px;
      min-height:40px;
    }

    .checkBooleanRow input[type="checkbox"]{
      width:20px;
      height:20px;
      margin:0;
      flex:0 0 auto;
    }

    .checkBooleanText{
      font-size:14px;
    }

    .checkInputText,
    .checkInputNumber{
      width:100%;
      border:1px solid #d0d5dd;
      border-radius:10px;
      padding:10px 12px;
      font:inherit;
      box-sizing:border-box;
      background:#fff;
    }

    .checkInputText:disabled,
    .checkInputNumber:disabled,
    .checkInputBool:disabled{
      background:#f9fafb;
    }
.techChecklistCard {
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  background: #fff;
}

.techChecklistTitle {
  font-size: 15px;
  line-height: 1.4;
  color: #111827;
}

.techChecklistTitle .checkReq {
  color: #dc2626;
  margin-left: 4px;
}

.techChecklistMeta {
  margin-top: 4px;
  font-size: 13px;
}

.techChecklistControlWrap {
  margin-top: 8px;
}

.techChecklistBooleanRow {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.techChecklistBooleanText {
  font-size: 14px;
  color: #374151;
}

.techChecklistInput {
  width: 100%;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px;
  box-sizing: border-box;
}

.techChecklistSave {
  margin-top: 8px;
  font-size: 12px;
}

    @media (max-width:700px){
      .row{ grid-template-columns:1fr; }
      .kv{ grid-template-columns:1fr; }
      .ticketHead{ flex-direction:column; }
      .top{ align-items:flex-start; }
    }

    @media (max-width:640px){
      .checklistCard{ padding:10px; }
      .checkTitle{ font-size:14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Technician App</h1>
        <div class="muted">
          Login with phone + PIN. Your assignments sync automatically from the office system.
        </div>
      </div>
    </div>

    <div id="loginCard" class="card">
      <div class="row">
        <div>
          <label>Phone</label>
          <input id="phone" placeholder="e.g. 17123456" />
        </div>
        <div>
          <label>PIN (4–8 digits)</label>
          <input id="pin" type="password" placeholder="••••" />
        </div>
      </div>
      <div style="display:flex; gap:10px; margin-top:12px; align-items:center;">
        <button class="btn btnPrimary" onclick="login()">Login</button>
        <div id="loginMsg" class="muted"></div>
      </div>
      <div class="muted" style="margin-top:10px;">If PIN is not set yet, ask management to set your PIN in the office system.</div>
    </div>

    <div id="appCard" class="card hide">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;">
        <div>
          <div class="muted">Logged in as</div>
          <div id="me" style="font-weight:1000; font-size:18px;"></div>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn" onclick="refreshJobs()">Refresh</button>
          <button class="btn" onclick="logout()">Logout</button>
        </div>
      </div>

      <div class="chips" id="chips" style="margin-top:12px;"></div>

      <div id="list" class="grid"></div>
      <div id="empty" class="muted" style="margin-top:14px; display:none;">No assignments found.</div>
    </div>
  </div>

  <div id="modalBack" class="modalBack">
    <div class="modal">
      <div class="modalHead">
        <div id="modalTitle" class="modalTitle">Modal</div>
        <button class="btn" type="button" onclick="closeModal()">Close</button>
      </div>
      <div id="modalBody" class="modalBody"></div>
      <div id="modalFoot" class="modalFoot"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script>
 
let alertAudio = null;
let lastBreakdownIds = new Set();
let breakdownIdsInitialized = false;

function unlockAlertAudio() {
  if (!alertAudio) {
    alertAudio = new Audio('/alert.mp3');
    alertAudio.volume = 1.0;
  }

  alertAudio.play()
    .then(() => {
      alertAudio.pause();
      alertAudio.currentTime = 0;
    })
    .catch(() => {});
}

document.addEventListener('click', unlockAlertAudio, { once: true });
document.addEventListener('touchstart', unlockAlertAudio, { once: true });

function playAlertSound() {
  if (!alertAudio) {
    alertAudio = new Audio('/alert.mp3');
    alertAudio.volume = 1.0;
  }

  alertAudio.currentTime = 0;
  alertAudio.play().catch((err) => {
    console.log('Alert sound blocked:', err);
  });

  if (navigator.vibrate) {
    navigator.vibrate([300, 150, 300]);
  }
}

const API_BASE = location.origin;
  const LS_TOKEN = "liftapp.tech.token";
  const LS_TECH = "liftapp.tech.profile";

  let filterStatus = 'ALL';
  let jobsCache = [];
  let activeJobId = null;

  function byId(id){ return document.getElementById(id); }

  function escapeHtml(v){
    return String(v ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function showToast(message, type = 'info'){
    const el = byId('toast');
    el.textContent = message;
    el.style.background =
      type === 'success' ? '#16a34a' :
      type === 'error' ? '#dc2626' :
      type === 'warn' ? '#d97706' : '#111827';
    el.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => el.classList.remove('show'), 2400);
  }

  function setBusy(on){
    document.body.style.cursor = on ? 'wait' : 'default';
  }

  function setFilter(chip){
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');

  filterStatus = chip.getAttribute('data-filter') || 'ALL';

  console.log('FILTER CHANGED TO:', filterStatus); // 👈 ADD THIS

  renderJobCards();
}

  function getToken(){ return localStorage.getItem(LS_TOKEN) || ''; }
  function setToken(token){ localStorage.setItem(LS_TOKEN, token); }
  function setProfile(profile){ localStorage.setItem(LS_TECH, JSON.stringify(profile || null)); }
  function clearToken(){
    localStorage.removeItem(LS_TOKEN);
    localStorage.removeItem(LS_TECH);
  }


  async function parseResponse(res, fallback){
    const text = await res.text();
    let data = {};
    try {
      data = text ? JSON.parse(text) : {};
    } catch {
      data = { raw: text };
    }
    if (!res.ok) {
      throw new Error(data?.error || data?.message || data?.raw || fallback);
    }
    return data;
  }

function getTechAuthHeaders() {
  return {
    'Content-Type': 'application/json',
    Authorization: `Bearer ${localStorage.getItem('liftapp.tech.token') || ''}`,
  };
}

  async function apiFetch(path, options = {}, fallback = 'Request failed'){
    const res = await fetch(API_BASE + path, options);
    return parseResponse(res, fallback);
  }

  function isServiceRole(role){
    const r = String(role || '').toUpperCase();
    return r.includes('AMC SERVICE') || r.includes('WARRANTY SERVICE');
  }

  function checklistSummaryText(summary){
    if (!summary) return 'No checklist';
    return `${summary.doneRequired || 0}/${summary.totalRequired || 0} required complete (${summary.percent || 0}%)`;
  }

  function renderChecklistStatusBadge(summary){
    const raw = String(summary?.status || 'NOT_STARTED').toUpperCase();
    if (raw === 'COMPLETED') return `<span class="badge bDone">Checklist Complete</span>`;
    if (raw === 'IN_PROGRESS') return `<span class="badge bInfo">Checklist In Progress</span>`;
    return `<span class="badge">Checklist Not Started</span>`;
  }

  function badgeClass(status){
    const s = String(status || '').toUpperCase();
    if (s === 'ASSIGNED') return 'badge bAssigned';
    if (s === 'IN_PROGRESS') return 'badge bProg';
    if (s === 'DONE') return 'badge bDone';
    if (s === 'CANCELLED') return 'badge bCancel';
    if (s === 'REJECTED') return 'badge bDanger';
    return 'badge';
  }

  function statusLabel(job){
    const s = String(job.status || '').replaceAll('_', ' ');
    if (job.resubmissionRequired) return `${s} • Needs Fix`;
    return s;
  }

  function formatDate(v){
    if (!v) return '—';
    try { return new Date(v).toLocaleDateString(); }
    catch { return String(v); }
  }

  function getMyRole(job){
    return String(job.teamRole || job.myTeamRole || '').toUpperCase();
  }

  function isLead(job){
    return getMyRole(job) === 'LEAD';
  }

  function filterJobs(rows){
  if (filterStatus === 'ALL') return rows;

  if (filterStatus === 'NEEDS_FIX') {
    return rows.filter(r => !!r.resubmissionRequired);
  }

  return rows.filter(r => {
    const s = String(r.status || '').toUpperCase().trim();

    if (filterStatus === 'DONE') {
      return ['DONE', 'COMPLETED', 'CLOSED', 'RESOLVED'].includes(s);
    }

    if (filterStatus === 'IN_PROGRESS') {
      return s === 'IN_PROGRESS';
    }

    if (filterStatus === 'ASSIGNED') {
      return s === 'ASSIGNED';
    }

    return false;
  });
}

  function openModal(title, bodyHtml, footerHtml = ''){
    byId('modalTitle').textContent = title;
    byId('modalBody').innerHTML = bodyHtml;
    byId('modalFoot').innerHTML = footerHtml;
    byId('modalBack').style.display = 'flex';
  }

  function closeModal(){
    byId('modalBack').style.display = 'none';
    byId('modalTitle').textContent = '';
    byId('modalBody').innerHTML = '';
    byId('modalFoot').innerHTML = '';
  }

  byId('modalBack').addEventListener('click', (e) => {
    if (e.target === byId('modalBack')) closeModal();
  });

  async function login(){
    const phone = byId('phone').value.trim();
    const pin = byId('pin').value.trim();
    const msg = byId('loginMsg');
    msg.textContent = '';

    setBusy(true);
    try{
      const data = await apiFetch('/api/tech/login', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ phone, pin })
      }, 'Login failed');

      setToken(data.token);
      setProfile(data.technician || null);
      await boot();
      showToast('Login successful', 'success');
    }catch(e){
      msg.textContent = e.message || 'Login failed';
    } finally {
      setBusy(false);
    }
  }

  function logout(){
    clearToken();
    jobsCache = [];
    activeJobId = null;
    byId('appCard').classList.add('hide');
    byId('loginCard').classList.remove('hide');
    byId('pin').value = '';
  }

  async function boot(){
    const token = getToken();
    if(!token) return;

    try{
      const meData = await apiFetch('/api/tech/me', {
        headers:{ 'Authorization':'Bearer ' + token }
      }, 'Failed to load profile');

      setProfile(meData.technician || null);
      byId('me').textContent = `${meData.technician.name} (${meData.technician.phone || ''})`;
      byId('loginCard').classList.add('hide');
      byId('appCard').classList.remove('hide');
      await refreshJobs();
    }catch(e){
      logout();
    }
  }

  async function refreshJobs(){
  const token = getToken();
  if(!token) return;

  setBusy(true);
  try {
    const assignments = await apiFetch('/api/tech/assignments', {
      headers:{ 'Authorization':'Bearer ' + token }
    }, 'Failed to load assignments');

    const breakdowns = await apiFetch('/api/tech/breakdown-jobs', {
  headers:{ 'Authorization':'Bearer ' + token }
}, 'Failed to load breakdown jobs');

console.log('RAW BREAKDOWNS FROM API:', JSON.stringify(breakdowns, null, 2));

    const mappedBreakdowns = (Array.isArray(breakdowns) ? breakdowns : []).map(b => ({
  id: b.id,
  assignmentId: b.assignmentId,
  technicianResponseStatus: b.technicianResponseStatus,
  escalationStatus: b.escalationStatus,
  status: (() => {
    const s = String(b.status || '').toUpperCase().trim();
    if (['DONE', 'COMPLETED', 'CLOSED', 'RESOLVED'].includes(s)) return 'DONE';
    if (s === 'IN_PROGRESS') return 'IN_PROGRESS';
    if (s === 'ASSIGNED') return 'ASSIGNED';
    return 'ASSIGNED';
  })(),
  role: 'BREAKDOWN',
  teamRole: b.assignment_role || 'LEAD',
  lift: {
    liftCode: b.liftCode || '',
    location: ''
  },
  project: {
    projectName: b.project || b.projectName || '',
    projectCode: b.projectCode || ''
  },
  notes: b.complaint || '',
  priority: b.priority || 'NORMAL',
  isBreakdown: true
}));

    jobsCache = [
      ...(Array.isArray(assignments) ? assignments : []),
      ...mappedBreakdowns
    ];

    const currentBreakdownIds = new Set(
      mappedBreakdowns
        .filter(j => String(j.status || '').toUpperCase() !== 'DONE')
        .map(j => String(j.id))
    );

    const newBreakdowns = [...currentBreakdownIds].filter(id => !lastBreakdownIds.has(id));

    console.log("BREAKDOWN ALERT DEBUG", {
      initialized: breakdownIdsInitialized,
      previous: [...lastBreakdownIds],
      current: [...currentBreakdownIds],
      newBreakdowns
    });

    if (newBreakdowns.length > 0) {
      playAlertSound();
      showToast('New breakdown job assigned', 'warn');
    }

    lastBreakdownIds = currentBreakdownIds;
    breakdownIdsInitialized = true;

    renderChips();
    renderJobCards();

  } catch (e) {
    alert(e.message || 'Failed to load jobs');
  } finally {
    setBusy(false);
  }
}

  function renderChips() {
    const container = byId('chips');
    const hasNeedsFix = jobsCache.some(j => j.resubmissionRequired);

    if (filterStatus === 'NEEDS_FIX' && !hasNeedsFix) {
      filterStatus = 'ALL';
    }

    container.innerHTML = `
      <div class="chip ${filterStatus === 'ALL' ? 'active' : ''}" data-filter="ALL" onclick="setFilter(this)">All</div>
      <div class="chip ${filterStatus === 'ASSIGNED' ? 'active' : ''}" data-filter="ASSIGNED" onclick="setFilter(this)">Assigned</div>
      <div class="chip ${filterStatus === 'IN_PROGRESS' ? 'active' : ''}" data-filter="IN_PROGRESS" onclick="setFilter(this)">In Progress</div>
      <div class="chip ${filterStatus === 'DONE' ? 'active' : ''}" data-filter="DONE" onclick="setFilter(this)">Done</div>

  async function updateJobStatus(job, status) {
  const token = getToken();

  const id = Number(job?.id);
  const path = job?.isBreakdown
    ? `/api/tech/breakdown-jobs/${id}/status`
    : `/api/tech/assignments/${id}/status`;

  console.log('STATUS UPDATE DEBUG:', {
    id,
    isBreakdown: job?.isBreakdown,
    status,
    path,
    tokenPresent: !!token,
    tokenStart: token ? token.slice(0, 20) : ''
  });

  if (!token) {
    throw new Error('Missing technician login token. Please logout and login again.');
  }

  setBusy(true);

  try {
    const r = await fetch(path, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
      },
      body: JSON.stringify({ status }),
    });

    const data = await r.json().catch(() => ({}));

    if (!r.ok) {
      throw new Error(data.error || 'Failed to update status');
    }

    await refreshJobs();
    return data;
  } finally {
    setBusy(false);
  }
}

      const id = Number(btn.getAttribute('data-save-breakdown-part'));
      try {
        await updateBreakdownPart(id, {
          itemName: byId(`bdPartName_${id}`)?.value || '',
          qty: Number(byId(`bdPartQty_${id}`)?.value || 1),
          remarks: byId(`bdPartRemarks_${id}`)?.value || '',
        });

        showToast('Part updated', 'success');
      } catch (e) {
        alert(e.message || String(e));
      }
    };
  });

  wrap.querySelectorAll('[data-delete-breakdown-part]').forEach(btn => {
    btn.onclick = async () => {
      const id = Number(btn.getAttribute('data-delete-breakdown-part'));
      if (!confirm('Delete this part?')) return;

        await deleteBreakdownPart(id);

        const active = jobsCache.find(j => Number(j.id) === Number(activeJobId));

      `;
    } else if (isText) {
      controlHtml = `
        <textarea
          class="checkInputText techChecklistInput"
          ${canEdit ? '' : 'disabled'}
          placeholder="Optional note / observation"
          rows="3"
        >${escapeHtml(item.textValue || '')}</textarea>
      `;
    } else if (isNumber) {
      controlHtml = `
        <input
          type="number"
          class="checkInputNumber techChecklistInput"
          ${canEdit ? '' : 'disabled'}
          value="${item.numberValue ?? ''}"
          placeholder="Enter value"
        />
      `;
    } else {
      controlHtml = `
        <input
          type="text"
          class="checkInputText techChecklistInput"
          ${canEdit ? '' : 'disabled'}
          value="${escapeHtml(item.textValue || '')}"
          placeholder="Enter value"
        />
      `;
    }

    card.innerHTML = `
      <div class="techChecklistTitle">
        <b>${item.sortOrder || (index + 1)}. ${escapeHtml(item.itemText)}</b>
        ${item.isRequired ? '<span class="checkReq">*</span>' : ''}
      </div>

      <div class="techChecklistMeta muted">
        ${item.isRequired ? 'Required' : 'Optional'} · ${statusText}
      </div>

      <div class="techChecklistControlWrap">
        ${controlHtml}
      </div>

      <div class="techChecklistSave muted" data-role="saveState"></div>
    `;

    const saveStateEl = card.querySelector('[data-role="saveState"]');
    const inputEl = card.querySelector('.checkInputBool, .checkInputText, .checkInputNumber');

    let saveTimer = null;

    async function saveItem() {
      if (!canEdit || !inputEl) return;

      try {
        saveStateEl.textContent = 'Saving…';

        const payload = {};

        if (isBoolean) {
          payload.isDone = !!inputEl.checked;
        } else if (isText) {
          const val = String(inputEl.value || '').trim();
          payload.textValue = inputEl.value;
          payload.isDone = !!val;
        } else if (isNumber) {
          const raw = String(inputEl.value || '').trim();
          payload.numberValue = raw === '' ? null : Number(raw);
          payload.isDone = raw !== '';
        } else {
          const val = String(inputEl.value || '').trim();
          payload.textValue = inputEl.value;
          payload.isDone = !!val;
        }

        await updateTechChecklistItem(jobId, item.id, payload);

        saveStateEl.textContent = 'Saved';

        const metaEl = card.querySelector('.techChecklistMeta');
        if (metaEl) {
          const newStatus = payload.isDone ? (isBoolean ? 'Done' : 'Filled') : 'Pending';
          metaEl.textContent = `${item.isRequired ? 'Required' : 'Optional'} · ${newStatus}`;
        }

        if (isBoolean) {
          const boolText = card.querySelector('.techChecklistBooleanText');
          if (boolText) {
            boolText.textContent = payload.isDone ? 'Marked done' : 'Tap to mark done';
          }
        }

        try {
          const fresh = await getTechChecklist(jobId);
          currentChecklist = fresh;
          const summaryEl = byId('checklistSummaryText');
          if (summaryEl) summaryEl.textContent = checklistSummaryText(fresh.summary);
        } catch (_) {}

        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          if (saveStateEl.textContent === 'Saved') saveStateEl.textContent = '';
        }, 1200);
      } catch (e) {
        saveStateEl.textContent = 'Not saved';
        alert(e.message || String(e));
      }
    }

    function debounceSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveItem, 500);
    }

    if (canEdit && inputEl) {
      if (isBoolean) {
        inputEl.addEventListener('change', saveItem);
      } else {
        inputEl.addEventListener('input', debounceSave);
        inputEl.addEventListener('blur', saveItem);
      }
    }

    itemsWrap.appendChild(card);
  });
}

      function renderNotes(notes) {
        const notesWrap = byId('checklistNotesWrap');
        notesWrap.innerHTML = '';

        if (!notes.length) {
          notesWrap.innerHTML = `<div class="muted">No notes yet.</div>`;
          return;
        }

        notes.forEach((n) => {
          const div = document.createElement('div');
          div.className = 'noteItem';
          div.innerHTML = `
            <div>${escapeHtml(n.noteText || '')}</div>
            <div class="muted" style="margin-top:6px;">
              ${escapeHtml(n.technician?.name || 'Technician')} · ${escapeHtml(n.createdAt || '')}
            </div>
          `;
          notesWrap.appendChild(div);
        });
      }

      function renderServiceParts(parts) {
        const wrap = byId('servicePartsWrap');
        if (!wrap) return;

        wrap.innerHTML = '';

        if (!parts.length) {
          wrap.innerHTML = `<div class="muted">No parts added yet.</div>`;
          return;
        }

        parts.forEach((p) => {
          const div = document.createElement('div');
          div.className = 'partItem';
          div.innerHTML = `
            <div class="field">
              <label>Part / Material</label>
              <input id="partName_${p.id}" value="${escapeHtml(p.itemName || '')}" ${isLocked ? 'disabled' : ''} />
            </div>
            <div class="field">
              <label>Qty</label>
              <input type="number" min="1" step="1" id="partQty_${p.id}" value="${escapeHtml(p.qty ?? 1)}" ${isLocked ? 'disabled' : ''} />
            </div>
            <div class="field">
              <label>Remarks</label>
              <textarea id="partRemarks_${p.id}" ${isLocked ? 'disabled' : ''}>${escapeHtml(p.remarks || '')}</textarea>
            </div>
            ${isLocked ? '' : `
              <div class="actions">
                <button class="btn btnSmall" data-save-part="${p.id}">Save Part</button>
                <button class="btn btnSmall" data-delete-part="${p.id}">Delete</button>
              </div>
            `}
          `;
          wrap.appendChild(div);
        });

        if (isLocked) return;

        wrap.querySelectorAll('[data-save-part]').forEach((btn) => {
          btn.onclick = async () => {
            const id = Number(btn.getAttribute('data-save-part'));
            try {
              await updateTechServicePart(id, {
                itemName: byId(`partName_${id}`)?.value || '',
                qty: Number(byId(`partQty_${id}`)?.value || 1),
                remarks: byId(`partRemarks_${id}`)?.value || ''
              });
              await refreshChecklistModal();
              showToast('Part updated', 'success');
            } catch (e) {
              alert(e.message || String(e));
            }
          };
        });

        wrap.querySelectorAll('[data-delete-part]').forEach((btn) => {
          btn.onclick = async () => {
            const id = Number(btn.getAttribute('data-delete-part'));
            if (!confirm('Delete this part?')) return;
            try {
              await deleteTechServicePart(id);
              await refreshChecklistModal();
              showToast('Part deleted', 'success');
            } catch (e) {
              alert(e.message || String(e));
            }
          };
        });
      }

      function wireChecklistModal() {
        renderItems(currentChecklist.items || []);
        renderNotes(currentChecklist.notes || []);
        renderServiceParts(currentReportData.parts || []);
        wireFollowUpToggle();

        const addNoteBtn = byId('btnAddChecklistNote');
        if (addNoteBtn) {
          addNoteBtn.onclick = async () => {
            try {
              const noteText = byId('checklistNoteText')?.value.trim();
              if (!noteText) throw new Error('Enter a note first');
              await addTechChecklistNote(jobId, noteText);
              await refreshChecklistModal();
              await refreshJobs();
              showToast('Note added', 'success');
            } catch (e) {
              alert(e.message || String(e));
            }
          };
        }

        if (isServiceRole(roleLabel) && !isLocked) {
          const saveReportBtn = byId('btnSaveServiceReport');
          const addPartBtn = byId('btnAddServicePart');

          if (saveReportBtn) {
            saveReportBtn.onclick = async () => {
              try {
                await saveTechServiceReport(jobId, {
                  overallCondition: byId('srOverallCondition')?.value || '',
                  faultsObserved: byId('srFaultsObserved')?.value || '',
                  actionTaken: byId('srActionTaken')?.value || '',
                  recommendations: byId('srRecommendations')?.value || '',
                  followUpRequired: !!byId('srFollowUpRequired')?.checked,
                  technicianRemarks: byId('srTechnicianRemarks')?.value || '',
                });
                await refreshChecklistModal();
                showToast('Service report saved', 'success');
              } catch (e) {
                alert(e.message || String(e));
              }
            };
          }

          if (addPartBtn) {
            addPartBtn.onclick = async () => {
              try {
                await addTechServicePart(jobId, {
                  itemName: 'New Part',
                  qty: 1,
                  remarks: '',
                });
                await refreshChecklistModal();
                showToast('Part added', 'success');
              } catch (e) {
                alert(e.message || String(e));
              }
            };
          }
        }
      }

      wireChecklistModal();
    } catch (e) {
      setBusy(false);
      alert(e.message || String(e));
    }
  }

 if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      await navigator.serviceWorker.register('/sw.js');
      console.log('Service worker registered');
    } catch (err) {
      console.error('Service worker registration failed:', err);
    }
  });
}

setInterval(() => {
  if (getToken()) refreshJobs();
}, 15000);

boot();
</script>
